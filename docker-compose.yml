version: '3.8'

services:
  # 1. MinIO: S3-совместимое объектное хранилище
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z  # проверенная версия
    platform: linux/amd64
    container_name: minio
    ports:
      - "9000:9000"   # Порт для API (S3)
      - "9001:9001"   # Порт для Web-интерфейса
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123   # Пароль > 8 символов - это важно!
    command: server /data --console-address ":9001"
    volumes:
      - ./data:/data
    networks:
      - lakehouse-net

  # 2. MLflow: Исправленная версия
  mlflow:
    image: python:3.10-slim
    container_name: mlflow
    ports:
      - "5000:5000"
    working_dir: /app
    command: bash -c "pip install mlflow boto3 && mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts"
    volumes:
      - ./mlflow:/mlflow
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin123
    networks:
      - lakehouse-net
    depends_on:
      - minio

networks:
  lakehouse-net:
    driver: bridge